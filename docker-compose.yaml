services:
  fulfillment-app-postgres:
    image: postgres:18.3-bookworm
    container_name: fulfillment-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  fulfillment-app-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
    depends_on:
      fulfillment-app-postgres:
        condition: service_healthy
    profiles:
      - tools

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: fulfillment-app-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:fulfillment-app-postgres:5432
    ports:
      - "127.0.0.1:5433:5432"
    depends_on:
      fulfillment-app-postgres:
        condition: service_healthy
    profiles:
      - dev

  fulfillment-app-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: fulfillment-app-backend
    env_file:
      - .env
    environment:
      - HTTP_ADDR=:8080
      - POSTGRES_HOST=fulfillment-app-postgres
      - POSTGRES_PORT=5432
      - LOGGER_FOLDER=/app/out/logs
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      fulfillment-app-postgres:
        condition: service_healthy
    restart: always
    profiles:
      - app
      - prod

  fulfillment-app-frontend-dev:
    image: node:22-alpine
    container_name: fulfillment-app-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ${PROJECT_ROOT}/frontend:/app
      - fulfillment-frontend-node-modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - VITE_API_BASE_URL=/api/v1
      - VITE_DEV_PROXY_TARGET=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - frontend-dev

  fulfillment-app-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: fulfillment-app-frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - fulfillment-app-backend
    restart: always
    profiles:
      - prod

volumes:
  fulfillment-frontend-node-modules:
